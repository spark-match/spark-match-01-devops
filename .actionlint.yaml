# =============================================================================
# actionlint configuration
# Docs: https://github.com/rhysd/actionlint/blob/main/docs/usage.md#configuration
#
# We disable specific shellcheck rules that produce false positives due to
# GitHub Actions template expansion (${{ ... }}) inside shell scripts.
# =============================================================================

shellcheck:
  # SC2086: Double quote to prevent globbing/word splitting
  # False positive: GitHub already expands ${{ inputs.* }} before shell runs.
  disable-errors:
    - SC2086
  # SC2129: Consider using { cmd1; cmd2; } >> file instead of individual redirects
  # Style preference, not an error.
  exclude:
    - SC2129