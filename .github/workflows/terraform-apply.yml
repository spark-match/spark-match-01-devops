# =============================================================================
# Reusable Workflow: Terraform Apply (N-environment aware)
# =============================================================================
# Runs `terraform plan` then `terraform apply` against a caller-provided
# working directory. Uses GitHub Environment as approval gate (configurable
# via the caller). Designed to be invoked per environment from a caller with
# N jobs.
#
# USAGE (in caller repo, single env):
#   jobs:
#     apply-prod:
#       uses: spark-match/spark-match-01-devops/.github/workflows/terraform-apply.yml@main
#       with:
#         environment: prod
#         working-directory: live/prod
#         apply-role-arn-secret: AWS_APPLY_ROLE_ARN_PROD
#         gh-environment: production
#
# Required GitHub Secret in caller repo: <apply-role-arn-secret>
# Required GH Environment: <gh-environment> (configured by repo admin)
#
# NOTE: The `gh-environment` field of the job is evaluated BEFORE any step
# runs, so it cannot reference step outputs. It uses an expression fallback:
#   ${{ inputs.gh-environment || inputs.environment }}
# If both are empty, the workflow fails (caller bug).
# =============================================================================

name: Terraform Apply

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment identifier (e.g. "dev", "staging", "prod"). Used for artifact naming, display, concurrency group. Defaults to basename of working-directory.'
        type: string
        required: false
        default: ''
      working-directory:
        description: 'Directory containing the Terraform configuration.'
        type: string
        required: false
        default: '.'
      aws-region:
        description: 'AWS region to deploy to.'
        type: string
        required: false
        default: 'us-east-1'
      apply-role-arn-secret:
        description: 'Name of the GitHub Secret containing the OIDC role ARN for apply (e.g. AWS_APPLY_ROLE_ARN_DEV).'
        type: string
        required: false
        default: 'AWS_APPLY_ROLE_ARN'
      terraform-version:
        description: 'Terraform version to use.'
        type: string
        required: false
        default: '1.10.0'
      backend-bucket:
        description: 'S3 bucket name for Terraform state.'
        type: string
        required: false
        default: ''
      backend-key:
        description: 'S3 key (path) for the Terraform state file.'
        type: string
        required: false
        default: 'terraform.tfstate'
      tfvars-file:
        description: 'Optional path to a tfvars file passed as -var-file. Empty = use committed terraform.tfvars.'
        type: string
        required: false
        default: ''
      var-files:
        description: 'Comma-separated list of additional tfvars files (additive). Empty = none.'
        type: string
        required: false
        default: ''
      target:
        description: 'Optional Terraform target (e.g. "module.security"). Empty = no target.'
        type: string
        required: false
        default: ''
      extra-args:
        description: 'Additional raw terraform CLI flags appended to plan. Use sparingly.'
        type: string
        required: false
        default: ''
      gh-environment:
        description: 'GitHub Environment name (used as approval gate). Falls back to inputs.environment. Required for production deploys.'
        type: string
        required: false
        default: ''
      auto-approve:
        description: 'If true, skip GH Environment approval gate (the GH Environment must have no required reviewers). Only use for non-prod envs. Default false.'
        type: boolean
        required: false
        default: false
      drift-only:
        description: 'If true, run plan only and post summary; do NOT apply. Useful for scheduled drift detection. Default false.'
        type: boolean
        required: false
        default: false
    outputs:
      apply-success:
        description: 'Whether the apply succeeded (true/false). False in drift-only mode if plan errored.'
        value: ${{ jobs.apply.outputs.apply-success }}
      has-changes:
        description: 'Whether the plan had resource changes.'
        value: ${{ jobs.apply.outputs.has-changes }}
      environment:
        description: 'Environment identifier echoed back.'
        value: ${{ jobs.apply.outputs.environment }}

# Concurrency group keyed by resolved environment (env || working-directory basename)
# and the working directory. Prevents concurrent applies to the same env.
concurrency:
  group: ${{ inputs.environment || inputs.working-directory }}-apply-${{ inputs.working-directory }}
  cancel-in-progress: false

permissions:
  id-token: write          # For OIDC
  contents: read
  pull-requests: write

jobs:
  apply:
    name: Apply (${{ inputs.environment || inputs.working-directory }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GH Environment uses input fallback: gh-environment > environment.
    # This is evaluated before any step runs, so it can't reference step outputs.
    environment: ${{ inputs.gh-environment || inputs.environment }}
    outputs:
      apply-success: ${{ steps.apply.outputs.apply-success }}
      has-changes: ${{ steps.plan.outputs.has-changes }}
      environment: ${{ steps.env.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Resolve environment identifier (for display/artifact/concurrency)
        id: env
        # Este step corre ANTES de checkout, asi que el working-directory del
        # caller (e.g. live/dev) aun no existe. Forzamos working-directory: .
        # para que GitHub no intente hacer cd a un dir que no existe.
        working-directory: .
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          else
            ENV=$(basename "${{ inputs.working-directory }}")
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "Resolved env=${ENV} | gh-env=${{ inputs.gh-environment || inputs.environment }} | auto-approve=${{ inputs.auto-approve }} | drift-only=${{ inputs.drift-only }}"

      - name: Checkout caller repository
        uses: actions/checkout@v6


      - name: Setup Terraform ${{ inputs.terraform-version }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Configure AWS credentials (OIDC, apply role)
        # Same cross-owner workaround as terraform-plan.yml: hardcode
        # AWS_APPLY_ROLE_ARN (caller uses `secrets: inherit`, which is a no-op
        # across owner boundaries but doesn't error).
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Create plugin cache directory
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Terraform init
        run: |
          INIT_ARGS="-input=false"
          if [ -n "${{ inputs.backend-bucket }}" ]; then
            INIT_ARGS="$INIT_ARGS \
              -backend-config=bucket=${{ inputs.backend-bucket }} \
              -backend-config=key=${{ inputs.backend-key }} \
              -backend-config=region=${{ inputs.aws-region }} \
              -backend-config=use_lockfile=true"
          else
            INIT_ARGS="$INIT_ARGS -backend=false"
          fi
          echo "Running: terraform init $INIT_ARGS"
          # shellcheck disable=SC2086
          terraform init $INIT_ARGS
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          set +e
          # Note: -lock=false here because the next step (apply) acquires
          # the S3 native lockfile. Holding it during plan would block
          # other workflows.
          PLAN_ARGS="-input=false -no-color -lock=false -out=tfplan"
          if [ -n "${{ inputs.tfvars-file }}" ]; then
            PLAN_ARGS="$PLAN_ARGS -var-file=${{ inputs.tfvars-file }}"
          fi
          if [ -n "${{ inputs.var-files }}" ]; then
            IFS=',' read -ra FILES <<< "${{ inputs.var-files }}"
            for f in "${FILES[@]}"; do
              PLAN_ARGS="$PLAN_ARGS -var-file=$f"
            done
          fi
          if [ -n "${{ inputs.target }}" ]; then
            PLAN_ARGS="$PLAN_ARGS -target=${{ inputs.target }}"
          fi
          if [ -n "${{ inputs.extra-args }}" ]; then
            PLAN_ARGS="$PLAN_ARGS ${{ inputs.extra-args }}"
          fi
          echo "Running: terraform plan $PLAN_ARGS"
          # shellcheck disable=SC2086
          terraform plan $PLAN_ARGS
          EXIT_CODE=$?
          set -e
          echo "plan-exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${EXIT_CODE}" = "2" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            # 0 = no changes, 1 = error
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert plan to JSON
        if: steps.plan.outputs.has-changes == 'true'
        run: terraform show -json tfplan > tfplan.json

      - name: Generate plan summary
        if: steps.plan.outputs.has-changes == 'true'
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          WD="${{ inputs.working-directory }}"
          REGION="${{ inputs.aws-region }}"
          {
            echo "## Terraform Apply Plan — \`${ENV}\`"
            echo ""
            if [ "${{ inputs.drift-only }}" = "true" ]; then
              echo "**Mode:** drift-only (no apply)"
              echo ""
            fi
            echo "| Field | Value |"
            echo "|:---|:---|"
            echo "| Environment | \`${ENV}\` |"
            echo "| Working directory | \`${WD}\` |"
            echo "| AWS region | \`${REGION}\` |"
            echo "| State bucket | \`${{ inputs.backend-bucket }}\` |"
            echo "| State key | \`${{ inputs.backend-key }}\` |"
            echo ""
            echo "| Resource | Change |"
            echo "|:---|:---|"
            jq -r '
              .resource_changes[]
              | "| \(.address) | \(.change.actions | tostring | gsub("[\"\\[\\]]"; "")) |"
            ' tfplan.json || echo "_(no resource changes)_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        id: apply
        if: steps.plan.outputs.has-changes == 'true' && inputs.drift-only != 'true'
        run: |
          set +e
          terraform apply -input=false tfplan
          EXIT_CODE=$?
          set -e
          if [ "${EXIT_CODE}" = "0" ]; then
            echo "apply-success=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply-success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply result summary
        if: always()
        run: |
          {
            echo "## Terraform Apply Result — \`${{ steps.env.outputs.environment }}\`"
            echo ""
            if [ "${{ inputs.drift-only }}" = "true" ]; then
              echo "Mode: **drift-only** (plan completed, no apply performed)"
              if [ "${{ steps.plan.outputs.has-changes }}" = "true" ]; then
                echo ""
                echo "> Drift detected: see plan summary above."
              else
                echo ""
                echo "> No drift."
              fi
            elif [ "${{ steps.apply.outputs.apply-success }}" = "true" ]; then
              echo "Status: **Success**"
              echo ""
              echo "Triggered by: @${{ github.actor }}"
              echo "Commit: ${{ github.sha }}"
              echo "Environment: ${{ steps.env.outputs.environment }}"
            elif [ "${{ steps.plan.outputs.has-changes }}" = "true" ]; then
              echo "Status: **Failed** (apply error)"
            else
              echo "Status: **No changes** (nothing to apply)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on apply failure
        if: failure() && steps.apply.outputs.apply-success != 'true' && inputs.drift-only != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-apply-failed-${{ steps.env.outputs.environment }}
          message: |
            ## Terraform Apply Failed — `${{ steps.env.outputs.environment }}`

            Working directory: `${{ inputs.working-directory }}`
            Commit: ${{ github.sha }}
            Author: @${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please investigate. The state file may have partial changes if apply was interrupted.

            To recover:
            1. Check CloudTrail for what was created/modified
            2. Run `terraform plan` locally to see the drift
            3. Decide whether to manually fix or re-run this workflow

      - name: Notify on drift detected
        if: always() && inputs.drift-only == 'true' && steps.plan.outputs.has-changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-drift-${{ steps.env.outputs.environment }}
          message: |
            ## Terraform Drift Detected — `${{ steps.env.outputs.environment }}`

            Scheduled drift detection found changes outside of Terraform.
            See [Job Summary](../../actions/runs/${{ github.run_id }}) for the resource change table.
