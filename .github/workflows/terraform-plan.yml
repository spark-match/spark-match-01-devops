# =============================================================================
# Reusable Workflow: Terraform Plan (N-environment aware)
# =============================================================================
# Runs `terraform plan` against a caller-provided working directory and writes
# results to a per-environment artifact + per-environment sticky comment on
# the PR. Designed to be invoked from a matrix [dev, staging, prod, ...].
#
# USAGE (in caller repo, single env):
#   jobs:
#     plan-dev:
#       uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@main
#       with:
#         environment: dev
#         working-directory: live/dev
#         plan-role-arn-secret: AWS_PLAN_ROLE_ARN_DEV
#
# USAGE (in caller repo, matrix N envs):
#   jobs:
#     plan:
#       strategy:
#         matrix:
#           include:
#             - { environment: dev, working-directory: live/dev, ... }
#             - { environment: staging, working-directory: live/staging, ... }
#             - { environment: prod, working-directory: live/prod, ... }
#       uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@main
#       with:
#         environment: ${{ matrix.environment }}
#         working-directory: ${{ matrix.working-directory }}
#         plan-role-arn-secret: ${{ matrix.plan-role-arn-secret }}
#
# Required GitHub Secret in caller repo: <plan-role-arn-secret>
# Required AWS: IAM Role with OIDC trust policy for this repo
# =============================================================================

name: Terraform Plan

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment identifier (e.g. "dev", "staging", "prod"). Used for artifact naming, comment header, and display. Defaults to basename of working-directory.'
        type: string
        required: false
        default: ''
      working-directory:
        description: 'Directory containing the Terraform configuration (relative to repo root).'
        type: string
        required: false
        default: '.'
      aws-region:
        description: 'AWS region to deploy to.'
        type: string
        required: false
        default: 'us-east-1'
      plan-role-arn-secret:
        description: 'Name of the GitHub Secret containing the OIDC role ARN for plan (e.g. AWS_PLAN_ROLE_ARN_DEV).'
        type: string
        required: false
        default: 'AWS_PLAN_ROLE_ARN'
      terraform-version:
        description: 'Terraform version to use.'
        type: string
        required: false
        default: '1.10.0'
      backend-bucket:
        description: 'S3 bucket name for Terraform state.'
        type: string
        required: false
        default: ''
      backend-key:
        description: 'S3 key (path) for the Terraform state file.'
        type: string
        required: false
        default: 'terraform.tfstate'
      tfvars-file:
        description: 'Optional path to a tfvars file passed as -var-file (e.g. "prod.tfvars"). Empty = use committed terraform.tfvars.'
        type: string
        required: false
        default: ''
      var-files:
        description: 'Comma-separated list of additional tfvars files (additive). Empty = none.'
        type: string
        required: false
        default: ''
      target:
        description: 'Optional Terraform target (e.g. "module.security" or "aws_s3_bucket.foo"). Empty = no target.'
        type: string
        required: false
        default: ''
      extra-args:
        description: 'Additional raw terraform CLI flags appended to plan. Use sparingly.'
        type: string
        required: false
        default: ''
      comment-on-pr:
        description: 'Post plan summary as a sticky comment on the PR (header = terraform-plan-<environment>).'
        type: boolean
        required: false
        default: true
    outputs:
      plan-exit-code:
        description: 'Exit code from terraform plan (0 = success, 1 = error, 2 = changes).'
        value: ${{ jobs.plan.outputs.plan-exit-code }}
      has-changes:
        description: 'Whether the plan has resource changes (true/false).'
        value: ${{ jobs.plan.outputs.has-changes }}
      environment:
        description: 'Environment identifier echoed back.'
        value: ${{ jobs.plan.outputs.environment }}

permissions:
  id-token: write          # For OIDC
  contents: read
  pull-requests: write     # For posting comments

jobs:
  plan:
    name: Plan (${{ inputs.environment || inputs.working-directory }})
    runs-on: ubuntu-latest
    outputs:
      plan-exit-code: ${{ steps.plan.outputs.plan-exit-code }}
      has-changes: ${{ steps.plan.outputs.has-changes }}
      environment: ${{ steps.env.outputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Resolve environment identifier
        id: env
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          else
            ENV=$(basename "${{ inputs.working-directory }}")
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "Resolved environment: ${ENV}"

      - name: Setup Terraform ${{ inputs.terraform-version }}
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Configure AWS credentials (OIDC, plan role)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets[inputs.plan-role-arn-secret] }}
          aws-region: ${{ inputs.aws-region }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Create plugin cache directory
        run: mkdir -p ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Terraform init
        run: |
          INIT_ARGS="-input=false"
          if [ -n "${{ inputs.backend-bucket }}" ]; then
            INIT_ARGS="$INIT_ARGS \
              -backend-config=bucket=${{ inputs.backend-bucket }} \
              -backend-config=key=${{ inputs.backend-key }} \
              -backend-config=region=${{ inputs.aws-region }} \
              -backend-config=use_lockfile=true"
          else
            INIT_ARGS="$INIT_ARGS -backend=false"
          fi
          echo "Running: terraform init $INIT_ARGS"
          # shellcheck disable=SC2086
          terraform init $INIT_ARGS
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          set +e
          PLAN_ARGS="-input=false -no-color -lock=false -out=tfplan"
          if [ -n "${{ inputs.tfvars-file }}" ]; then
            PLAN_ARGS="$PLAN_ARGS -var-file=${{ inputs.tfvars-file }}"
          fi
          if [ -n "${{ inputs.var-files }}" ]; then
            IFS=',' read -ra FILES <<< "${{ inputs.var-files }}"
            for f in "${FILES[@]}"; do
              PLAN_ARGS="$PLAN_ARGS -var-file=$f"
            done
          fi
          if [ -n "${{ inputs.target }}" ]; then
            PLAN_ARGS="$PLAN_ARGS -target=${{ inputs.target }}"
          fi
          if [ -n "${{ inputs.extra-args }}" ]; then
            PLAN_ARGS="$PLAN_ARGS ${{ inputs.extra-args }}"
          fi
          echo "Running: terraform plan $PLAN_ARGS"
          # shellcheck disable=SC2086
          terraform plan $PLAN_ARGS
          EXIT_CODE=$?
          set -e
          echo "plan-exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          # Terraform exit codes:
          #   0 = plan succeeded with no changes
          #   1 = error
          #   2 = plan succeeded with changes
          if [ "${EXIT_CODE}" = "2" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          elif [ "${EXIT_CODE}" = "0" ]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert plan to JSON
        if: steps.plan.outputs.has-changes == 'true'
        run: terraform show -json tfplan > tfplan.json

      - name: Generate plan summary
        if: steps.plan.outputs.has-changes == 'true'
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          WD="${{ inputs.working-directory }}"
          REGION="${{ inputs.aws-region }}"
          {
            echo "## Terraform Plan Summary"
            echo ""
            echo "| Field | Value |"
            echo "|:---|:---|"
            echo "| Environment | \`${ENV}\` |"
            echo "| Working directory | \`${WD}\` |"
            echo "| AWS region | \`${REGION}\` |"
            echo "| State bucket | \`${{ inputs.backend-bucket }}\` |"
            echo "| State key | \`${{ inputs.backend-key }}\` |"
            echo ""
            echo "### Resource changes"
            echo ""
            echo "| Resource | Change |"
            echo "|:---|:---|"
            jq -r '
              .resource_changes[]
              | "| \(.address) | \(.change.actions | tostring | gsub("[\"\\[\\]]"; "")) |"
            ' tfplan.json || echo "_(no resource changes)_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: steps.plan.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-${{ steps.env.outputs.environment }}-pr-${{ github.event.pull_request.number }}
          path: ${{ inputs.working-directory }}/tfplan
          retention-days: 7

      - name: Comment PR with plan summary
        if: steps.plan.outputs.has-changes == 'true' && inputs.comment-on-pr == true && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-${{ steps.env.outputs.environment }}
          message: |
            ## Terraform Plan — `${{ steps.env.outputs.environment }}`

            - **Environment:** `${{ steps.env.outputs.environment }}`
            - **Working directory:** `${{ inputs.working-directory }}`
            - **AWS region:** `${{ inputs.aws-region }}`
            - **State bucket:** `${{ inputs.backend-bucket }}`
            - **State key:** `${{ inputs.backend-key }}`

            See [Job Summary](../../actions/runs/${{ github.run_id }}) for the resource change table.

            Download the artifact `terraform-plan-${{ steps.env.outputs.environment }}-pr-${{ github.event.pull_request.number }}` and run `terraform show tfplan` locally for full details.

      - name: Comment PR with no-changes notice
        if: steps.plan.outputs.has-changes == 'false' && inputs.comment-on-pr == true && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-${{ steps.env.outputs.environment }}
          message: |
            ## Terraform Plan — `${{ steps.env.outputs.environment }}`

            No changes. ✓
