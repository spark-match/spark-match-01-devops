# =============================================================================
# CI - Lint & Security for spark-match-01-devops
# =============================================================================
# Trigger:
#   - pull_request: opened, synchronized or reopened targeting 'main' or 'dev',
#                   gated by the path filter (lint only what changed).
#   - push: any direct push to 'main' or 'dev' (including admin-bypass force
#           pushes), no path filter. Guarantees the ruleset's
#           strict_required_status_checks_policy is satisfied at every commit
#           on the protected branches. Runs in parallel with any active PR run;
#           concurrency: cancel-in-progress: true keeps the active one.
#
# Action: Run the atomic ecosystem recipes (actionlint, gitleaks, yamllint)
#         against this repository so a broken recipe is caught here before
#         consumers (orion-backend, orion-infrastructure, orion-cognitive-
#         agent, etc.) get a bad reference. Python/node/deploy recipes are
#         validated directly by caller repos on their own PRs (see
#         `docs/VERSIONING.md` § strategy).
#
# Each job calls the corresponding reusable workflow via a local path
# (`./.github/workflows/<name>.yml`). When merged, the same recipes become
# available to external repos via
#   spark-match/spark-match-01-devops/.github/workflows/<name>.yml@dev
#
# Other layers (node/eslint, deploy/sam-deploy, deploy/terraform-*,
# python/python-ci, etc.) are NOT exercised here since the devops repo
# itself has no Node project, SAM stack, or Python package to lint. They
# are validated directly by the consumer repos.
# =============================================================================

name: CI - Lint & Security

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/**'
      - '**.yml'
      - '**.yaml'
      - '**.md'
  push:
    branches: [main, dev]       # no paths filter — strict mode requires checks on every commit

permissions:
  contents: read

# Cancel in-progress runs for the same PR + branch. Saves runner minutes on
# rapid pushes. The cancel-in-progress: true is safe for lint jobs (idempotent).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    uses: ./.github/workflows/actionlint.yml
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: ./.github/workflows/gitleaks.yml
    with:
      environment-name: ci
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  yamllint:
    name: yamllint
    uses: ./.github/workflows/yamllint.yml
    with:
      environment-name: ci
