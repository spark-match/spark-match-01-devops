# =============================================================================
# CI - Self-test for spark-match-01-devops
# =============================================================================
# Trigger:
#   - pull_request: opened, synchronized or reopened targeting 'main' or 'dev',
#                   gated by the path filter (lint only what changed).
#   - push: any direct push to 'main' or 'dev' (including admin-bypass force
#           pushes), no path filter. Guarantees the ruleset's
#           strict_required_status_checks_policy is satisfied at every commit
#           on the protected branches. Runs in parallel with any active PR run;
#           concurrency: cancel-in-progress: true keeps the active one.
#
# Action: Run the atomic ecosystem recipes (actionlint, gitleaks, yamllint)
#         plus a Python QA self-test of the `python-ci.yml` recipe. This is a
#         self-test: if a recipe is broken, ci.yml shows red and the team
#         fixes it before consumers (orion-backend, orion-infrastructure,
#         etc.) get a bad reference.
#
# Each job calls the corresponding reusable workflow via a local path
# (`./ecosystem/<name>.yml`). When merged, the same recipes become available
# to external repos via
#   spark-match/spark-match-01-devops/.github/workflows/ecosystem/<name>.yml@dev
#
# Other layers (node/eslint, deploy/sam-deploy, deploy/terraform-*)
# are NOT exercised here since the devops repo itself has no Node project
# or SAM stack to deploy. They are exercised by the consumer repos.
#
# The Python QA self-test runs against `tests/fixtures/python-project/`,
# a minimal dummy project that dogfoods the `python-ci.yml` recipe with
# two dependency groups (`dev`, `lint`) on a single Python version
# (3.12 hardcoded in the recipe; multi-version matrix is blocked by the
# upstream GHA bug documented in `DIAGNOSTICO-GHA-MATRIX-CROSSOWNER.md`
# and DIAGNOSTICO-GHA-MATRIX-CROSSOWNER-UPDATE.md — see § 8 of
# `docs/PYTHON-CI.md` for the full back-reference).
# =============================================================================

name: CI - Lint & Security

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/**'
      - '**.yml'
      - '**.yaml'
      - '**.md'
  push:
    branches: [main, dev]       # no paths filter — strict mode requires checks on every commit

permissions:
  contents: read
  # Required by the python-ci.yml recipe's sticky PR coverage comment
  # step (gated by `permissions-write: true`). The step is skipped when
  # the input is false, so this permission is idle in most runs.
  pull-requests: write

# Cancel in-progress runs for the same PR + branch. Saves runner minutes on
# rapid pushes. The cancel-in-progress: true is safe for lint jobs (idempotent).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    uses: ./.github/workflows/actionlint.yml
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: ./.github/workflows/gitleaks.yml
    with:
      environment-name: ci
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  yamllint:
    name: yamllint
    uses: ./.github/workflows/yamllint.yml
    with:
      environment-name: ci

  python-qa:
    name: python-qa-self-test
    # Cross-owner reference pinned to @main (Sprint B promotion @ fd14f27).
    # Mirrors the reference consumed by external callers (e.g.
    # orion-cognitive-agent@main uses spark-match-01-devops/.github/
    # workflows/python-ci.yml@main). When merging a recipe change to a
    # branch other than main (e.g. `dev`), local-path should be used
    # to avoid the chicken-and-egg where @main doesn't yet contain the
    # changes. See `docs/PYTHON-CI.md` § 7 (canonical caller patterns).
    uses: spark-match/spark-match-01-devops/.github/workflows/python-ci.yml@main
    with:
      environment-name: ci
      working-directory: tests/fixtures/python-project
      commands: lint:ruff-format,lint:ruff-check,lint:bandit,lock:check,typecheck:mypy,test:pytest,coverage:upload,security:pip-audit
      dependency-groups: dev lint security
      lock-check: true
      frozen: true
      ruff-targets: example tests
      mypy-targets: example
      pytest-targets: tests
