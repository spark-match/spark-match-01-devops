# =============================================================================
# Reusable Workflow: Gitleaks - Secret scanning
# =============================================================================
# Atomic recipe (ecosystem layer). Detects accidentally-committed secrets in
# the caller's git history.
#
# USAGE (in caller repo):
#   jobs:
#     gitleaks:
#       uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@dev
#       with:
#         environment-name: dev
#
# Pin: gitleaks/gitleaks-action@v3.
#   v3 requires a license for organization-scoped repos. The license is
#   stored as the org secret `GITLEAKS_LICENSE` and forwarded to the action
#   via env. The earlier "stay on v1 due to upstream SHA-resolution bug"
#   note is superseded: v3.0.0 (May 2026) rewrote the action in ESM with
#   Node 24; verified no SHA-resolution regressions in the dep updates
#   merged via PR #46.
#
# Inputs:
#   environment-name: Informational. Used in job name + logs.
#
# Cross-owner safe: only uses the auto-provisioned GITHUB_TOKEN. No caller
# secrets are forwarded. License is resolved by the runner from the org
# secret `GITLEAKS_LICENSE`.
# =============================================================================

name: Gitleaks

on:
  workflow_call:
    inputs:
      environment-name:
        description: 'Target environment name (informational, used in job name and logs).'
        type: string
        required: false
        default: 'dev'

permissions:
  contents: read

jobs:
  gitleaks:
    name: "gitleaks (env=${{ inputs.environment-name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
