# =============================================================================
# Reusable Workflow: LaTeX Release
# =============================================================================
# Compiles a LaTeX document, auto-bumps the patch version from the latest git
# tag, creates the new tag, and publishes a GitHub Release with the PDF.
#
# USAGE (in caller repo):
#   on:
#     pull_request:
#       types: [closed]
#   jobs:
#     release:
#       if: github.event.pull_request.merged == true
#       uses: spark-match/spark-match-01-devops/.github/workflows/latex-release.yml@main
#       with:
#         root-file: main.tex
#         release-name-prefix: Spark Match Paper
#
# Caller repo needs: contents: write permission (granted via GITHUB_TOKEN).
# =============================================================================

name: LaTeX Release

on:
  workflow_call:
    inputs:
      root-file:
        description: 'LaTeX root file to compile.'
        type: string
        required: true
        default: 'main.tex'
      release-name-prefix:
        description: 'Prefix for the GitHub Release name (version is appended).'
        type: string
        required: false
        default: 'Release'
      release-body-template:
        description: 'Custom body for the release (Markdown). Leave empty for default.'
        type: string
        required: false
        default: ''
    outputs:
      new-version:
        description: 'New version tag created.'
        value: ${{ jobs.release.outputs.new-version }}

permissions:
  contents: write   # Required to create tags and releases

jobs:
  release:
    name: Build & Release PDF
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Need full history to find latest tag

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CLEAN=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Latest tag: ${LATEST}"
          echo "Next version: ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ inputs.root-file }}

      - name: Rename PDF with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ROOT_BASE=$(echo "${{ inputs.root-file }}" | sed 's/\.tex$//')
          cp "${ROOT_BASE}.pdf" "release-${VERSION}.pdf"
          ls -la release-*.pdf

      - name: Create GitHub Release with PDF
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ inputs.release-name-prefix }} - ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-*.pdf
          body: |
            ## ${{ inputs.release-name-prefix }} - ${{ steps.version.outputs.version }}

            Released automatically from merged Pull Request.

            ${{ inputs.release-body-template }}

            - **PR:** #${{ github.event.pull_request.number }} -- ${{ github.event.pull_request.title }}
            - **Author:** @${{ github.event.pull_request.user.login }}
            - **Merged at:** ${{ github.event.pull_request.merged_at }}
            - **SHA:** `${{ github.event.pull_request.merge_commit_sha }}`

            Download the PDF artifact attached below.