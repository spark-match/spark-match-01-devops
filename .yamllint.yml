---
# yamllint configuration for spark-match-01-devops
# Docs: https://yamllint.readthedocs.io/

extends: default

ignore: |
  .git/
  .terraform/
  node_modules/
  .github/workflows/

rules:
  # Allow longer lines (workflow files often have long input names + URLs)
  line-length:
    max: 160

  # Allow multiple documents in one file (--- separators)
  document-start: disable

  # Allow truthy values like 'on' (used in workflows) and 'yes'
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false

  # Allow comments to be indented differently from parent
  comments:
    min-spaces-from-content: 1
    require-starting-space: true
